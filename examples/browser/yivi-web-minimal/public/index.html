<!doctype html>

<html>

  <head>
    <title>Yivi web minimal example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="yivi.js" type="text/javascript" defer></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #yivi-qr {
        width: 250px;
        height: 250px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <div id="yivi-qr"></div>
  </body>

</html>
